<!DOCTYPE html>
<html lang="en">

<head>
    <title>Flask SQLite App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            width:400px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#243b55;
        }

        form{
            display:flex;
            gap:10px;
            margin-bottom:25px;
        }

        input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:14px;
        }

        input:focus{
            border-color:#243b55;
        }

        button{
            padding:12px 18px;
            background:#243b55;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#141e30;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:10px;
        }

        caption{
            margin-bottom:10px;
            font-weight:bold;
            color:#243b55;
        }

        th{
            background:#243b55;
            color:white;
        }

        th, td{
            padding:12px;
            text-align:left;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>User Management</h1>

        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Enter name" required>
            <input type="text" name="Designation" placeholder="Designation" required>
            <button type="submit">Add User</button>
        </form>

        <table>
            <caption>User Details Table</caption>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Designation</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</body>
</html>
